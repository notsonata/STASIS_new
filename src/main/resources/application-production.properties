# Production configuration for DigitalOcean deployment
spring.profiles.active=production

# Application name
spring.application.name=stasis

# Database Configuration - Uses environment variables
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration for production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Production connection pool settings
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000

# Server configuration
server.port=${PORT:8080}

# Production logging
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.stasis=INFO

# Actuator endpoints
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Static resources configuration
spring.web.resources.static-locations=file:/app/static/
spring.web.resources.add-mappings=true

# Security headers for production
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
